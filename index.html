<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rate My Bakery</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-image: url("https://i.ytimg.com/vi/0L38Z9hIi5s/hq720.jpg");
    background-size: cover;
    background-position: center;
}

.container {
    width: 90%;
    max-width: 400px;
}

.box {
    background: white;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    position: relative;
}

h1 {
    color: white;
    text-align: center;
    margin-bottom: 20px;
}

.stars {
    display: flex;
    flex-direction: row-reverse;
    justify-content: center;
}

.stars input {
    display: none;
}

.stars label {
    font-size: 30px;
    color: #ccc;
    cursor: pointer;
}

.stars input:checked ~ label,
.stars label:hover,
.stars label:hover ~ label {
    color: gold;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: black;
    color: white;
    cursor: pointer;
}

.back-btn {
    position: absolute;
    top: 10px;
    left: 10px;
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
}

.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="container">

<h1>Rate My Bakery</h1>

<!-- Taste -->
<div class="box" id="taste">
<h3>Taste</h3>
<div class="stars">
<input type="radio" name="taste" value="5"><label>★</label>
<input type="radio" name="taste" value="4"><label>★</label>
<input type="radio" name="taste" value="3"><label>★</label>
<input type="radio" name="taste" value="2"><label>★</label>
<input type="radio" name="taste" value="1"><label>★</label>
</div>
<button onclick="next('packaging')">Next</button>
</div>

<!-- Packaging -->
<div class="box hidden" id="packaging">
<button class="back-btn" onclick="back('taste')">&#8592;</button>
<h3>Packaging</h3>
<div class="stars">
<input type="radio" name="packaging" value="5"><label>★</label>
<input type="radio" name="packaging" value="4"><label>★</label>
<input type="radio" name="packaging" value="3"><label>★</label>
<input type="radio" name="packaging" value="2"><label>★</label>
<input type="radio" name="packaging" value="1"><label>★</label>
</div>
<button onclick="next('service')">Next</button>
</div>

<!-- Service -->
<div class="box hidden" id="service">
<button class="back-btn" onclick="back('packaging')">&#8592;</button>
<h3>Service</h3>
<div class="stars">
<input type="radio" name="service" value="5"><label>★</label>
<input type="radio" name="service" value="4"><label>★</label>
<input type="radio" name="service" value="3"><label>★</label>
<input type="radio" name="service" value="2"><label>★</label>
<input type="radio" name="service" value="1"><label>★</label>
</div>
<button onclick="next('buyagain')">Next</button>
</div>

<!-- Buy Again -->
<div class="box hidden" id="buyagain">
<button class="back-btn" onclick="back('service')">&#8592;</button>
<h3>Would you buy again?</h3>
<div class="stars">
<input type="radio" name="buyagain" value="5"><label>★</label>
<input type="radio" name="buyagain" value="4"><label>★</label>
<input type="radio" name="buyagain" value="3"><label>★</label>
<input type="radio" name="buyagain" value="2"><label>★</label>
<input type="radio" name="buyagain" value="1"><label>★</label>
</div>
<button onclick="next('comments')">Next</button>
</div>

<!-- Comments -->
<div class="box hidden" id="comments">
<button class="back-btn" onclick="back('buyagain')">&#8592;</button>
<h3>Comments</h3>
<textarea id="text" style="width:100%;height:80px;"></textarea>
<button onclick="next('confirm')">Submit</button>
</div>

<!-- Confirm -->
<div class="box hidden" id="confirm">
<button class="back-btn" onclick="back('comments')">&#8592;</button>
<h3>Are you sure?</h3>
<p>Double check your ratings before submitting.</p>
<button onclick="submitFinal()">Submit Final</button>
</div>

<!-- Success -->
<div class="box hidden" id="done">
<h3>Thanks for your feedback!</h3>
</div>

</div>

<script>
function next(id) {
    document.querySelectorAll(".box").forEach(b => b.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}

function back(id) {
    next(id);
}

function submitFinal() {
    let cats = ["taste","packaging","service","buyagain"];
    for (let c of cats) {
        if (!document.querySelector(`input[name="${c}"]:checked`)) {
            alert("Please rate all 4 categories!");
            return;
        }
    }

    next("done");
}
</script>

</body>
</html>
