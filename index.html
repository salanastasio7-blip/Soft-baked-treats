<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rate My Bakery</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-image: url("https://i.ytimg.com/vi/0L38Z9hIi5s/hq720.jpg");
    background-size: cover;
    background-position: center;
}

.container {
    width: 90%;
    max-width: 400px;
}

.box {
    background: rgba(255, 255, 255, 0.95);
    padding: 30px 25px;
    border-radius: 16px;
    text-align: center;
    position: relative;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

h1 {
    color: white;
    text-align: center;
    margin-bottom: 25px;
    font-size: 32px;
}

.stars {
    display: flex;
    flex-direction: row-reverse;
    justify-content: center;
    gap: 10px;
}

.stars label {
    font-size: 40px;
    color: #ccc;
    cursor: pointer;
    transition: color 0.2s;
}

.stars input:checked ~ label,
.stars label:hover,
.stars label:hover ~ label {
    color: gold;
}

button {
    margin-top: 20px;
    padding: 14px 28px;
    border: none;
    border-radius: 12px;
    background: black;
    color: white;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.2s;
}

button:hover {
    background: #333;
}

.back-btn {
    position: absolute;
    top: 12px;
    left: 12px;
    background: none;
    border: none;
    font-size: 40px;
    font-weight: bold;
    cursor: pointer;
    color: black;
}

.hidden {
    display: none;
}

textarea {
    width: 100%;
    min-height: 60px;
    padding: 8px;
    font-size: 14px;
    border-radius: 5px;
    border: 1px solid #ccc;
    resize: vertical;
    margin-top: 10px;
}

#warning {
    color: red;
    margin-top: 10px;
}
</style>
</head>
<body>

<div class="container">

<h1>Rate My Bakery</h1>

<!-- Start Confirmation -->
<div class="box" id="start">
  <h3>Are you sure you want to submit a rating?</h3>
  <p>Once you start, you will go through all 4 categories.</p>
  <button onclick="next('taste')">Yes, Start</button>
</div>

<!-- Taste -->
<div class="box hidden" id="taste">
<h3>Taste</h3>
<div class="stars">
<input type="radio" name="taste" id="taste5" value="5"><label for="taste5">★</label>
<input type="radio" name="taste" id="taste4" value="4"><label for="taste4">★</label>
<input type="radio" name="taste" id="taste3" value="3"><label for="taste3">★</label>
<input type="radio" name="taste" id="taste2" value="2"><label for="taste2">★</label>
<input type="radio" name="taste" id="taste1" value="1"><label for="taste1">★</label>
</div>
<button onclick="next('packaging')">Next</button>
</div>

<!-- Packaging -->
<div class="box hidden" id="packaging">
<button class="back-btn" onclick="back('taste')">&#8592;</button>
<h3>Packaging</h3>
<div class="stars">
<input type="radio" name="packaging" id="packaging5" value="5"><label for="packaging5">★</label>
<input type="radio" name="packaging" id="packaging4" value="4"><label for="packaging4">★</label>
<input type="radio" name="packaging" id="packaging3" value="3"><label for="packaging3">★</label>
<input type="radio" name="packaging" id="packaging2" value="2"><label for="packaging2">★</label>
<input type="radio" name="packaging" id="packaging1" value="1"><label for="packaging1">★</label>
</div>
<button onclick="next('service')">Next</button>
</div>

<!-- Service -->
<div class="box hidden" id="service">
<button class="back-btn" onclick="back('packaging')">&#8592;</button>
<h3>Service</h3>
<div class="stars">
<input type="radio" name="service" id="service5" value="5"><label for="service5">★</label>
<input type="radio" name="service" id="service4" value="4"><label for="service4">★</label>
<input type="radio" name="service" id="service3" value="3"><label for="service3">★</label>
<input type="radio" name="service" id="service2" value="2"><label for="service2">★</label>
<input type="radio" name="service" id="service1" value="1"><label for="service1">★</label>
</div>
<button onclick="next('buyagain')">Next</button>
</div>

<!-- Buy Again -->
<div class="box hidden" id="buyagain">
<button class="back-btn" onclick="back('service')">&#8592;</button>
<h3>Would you buy again?</h3>
<div class="stars">
<input type="radio" name="buyagain" id="buyagain5" value="5"><label for="buyagain5">★</label>
<input type="radio" name="buyagain" id="buyagain4" value="4"><label for="buyagain4">★</label>
<input type="radio" name="buyagain" id="buyagain3" value="3"><label for="buyagain3">★</label>
<input type="radio" name="buyagain" id="buyagain2" value="2"><label for="buyagain2">★</label>
<input type="radio" name="buyagain" id="buyagain1" value="1"><label for="buyagain1">★</label>
</div>
<button onclick="next('comments')">Next</button>
</div>

<!-- Comments -->
<div class="box hidden" id="comments">
<button class="back-btn" onclick="back('buyagain')">&#8592;</button>
<h3>Comments</h3>
<textarea id="text" placeholder="Write something..."></textarea>
<button onclick="next('confirm')">Submit</button>
</div>

<!-- Confirm -->
<div class="box hidden" id="confirm">
<button class="back-btn" onclick="back('comments')">&#8592;</button>
<h3>Are you sure?</h3>
<p>Double check your ratings before submitting.</p>
<div id="warning"></div>
<button onclick="submitFinal()">Submit Final</button>
</div>

<!-- Done -->
<div class="box hidden" id="done">
<h3>Thanks for your feedback!</h3>
</div>

</div>

<script>
function next(id) {
    document.querySelectorAll(".box").forEach(b => b.classList.add("hidden"));
    document.getElementById(id).classList.remove("hidden");
}

function back(id) {
    next(id);
}

function submitFinal() {
    let cats = ["taste","packaging","service","buyagain"];
    let allRated = true;

    cats.forEach(c => {
        if (!document.querySelector(`input[name="${c}"]:checked`)) {
            allRated = false;
        }
    });

    const warning = document.getElementById("warning");

    if (!allRated) {
        warning.textContent = "Please rate all 4 categories!";
        return;
    } else {
        warning.textContent = "";
    }

    next("done");
}
</script>

</body>
</html>
