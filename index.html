<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bakery Rating</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-image: url("https://i.ytimg.com/vi/0L38Z9hIi5s/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CL");
    background-size: cover;
    background-position: center;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    justify-content: center; /* centers vertically */
    align-items: center;     /* centers horizontally */
    height: 100vh;           /* full viewport height */
}
h1 { color: white; margin-bottom: 20px; text-align: center; }
.section {
    display: none;
    width: 90%;
    max-width: 400px;
    background: rgba(255,255,255,0.85);
    padding: 15px;
    border-radius: 10px;
    text-align: center;      /* center text and stars */
}
.section.active { display: block; }
.stars { display: flex; flex-direction: row-reverse; justify-content: center; margin-bottom: 10px; }
.stars input { display: none; }
.stars label { font-size: 30px; color: #ccc; cursor: pointer; transition: 0.2s; }
.stars input:checked ~ label,
.stars label:hover,
.stars label:hover ~ label { color: #ffc107; }
textarea { width: 100%; min-height: 60px; margin-top: 10px; padding: 8px; border-radius: 5px; border: 1px solid #ccc; }
button {
    margin-top: 15px;
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #444;
    color: white;
    cursor: pointer;
}
button:hover { background: #222; }
</style>
</head>
<body>

<h1>Rate My Bakery</h1>

<div class="section active" id="taste">
    <h3>Taste</h3>
    <div class="stars">
        <input type="radio" name="taste" id="taste5" value="5"><label for="taste5">&#9733;</label>
        <input type="radio" name="taste" id="taste4" value="4"><label for="taste4">&#9733;</label>
        <input type="radio" name="taste" id="taste3" value="3"><label for="taste3">&#9733;</label>
        <input type="radio" name="taste" id="taste2" value="2"><label for="taste2">&#9733;</label>
        <input type="radio" name="taste" id="taste1" value="1"><label for="taste1">&#9733;</label>
    </div>
    <button onclick="next('taste','packaging')">Next</button>
</div>

<div class="section" id="packaging">
    <h3>Packaging</h3>
    <div class="stars">
        <input type="radio" name="packaging" id="packaging5" value="5"><label for="packaging5">&#9733;</label>
        <input type="radio" name="packaging" id="packaging4" value="4"><label for="packaging4">&#9733;</label>
        <input type="radio" name="packaging" id="packaging3" value="3"><label for="packaging3">&#9733;</label>
        <input type="radio" name="packaging" id="packaging2" value="2"><label for="packaging2">&#9733;</label>
        <input type="radio" name="packaging" id="packaging1" value="1"><label for="packaging1">&#9733;</label>
    </div>
    <button onclick="next('packaging','service')">Next</button>
</div>

<div class="section" id="service">
    <h3>Service</h3>
    <div class="stars">
        <input type="radio" name="service" id="service5" value="5"><label for="service5">&#9733;</label>
        <input type="radio" name="service" id="service4" value="4"><label for="service4">&#9733;</label>
        <input type="radio" name="service" id="service3" value="3"><label for="service3">&#9733;</label>
        <input type="radio" name="service" id="service2" value="2"><label for="service2">&#9733;</label>
        <input type="radio" name="service" id="service1" value="1"><label for="service1">&#9733;</label>
    </div>
    <button onclick="next('service','buyagain')">Next</button>
</div>

<div class="section" id="buyagain">
    <h3>Would you buy again?</h3>
    <div class="stars">
        <input type="radio" name="buyagain" id="buyagain5" value="5"><label for="buyagain5">&#9733;</label>
        <input type="radio" name="buyagain" id="buyagain4" value="4"><label for="buyagain4">&#9733;</label>
        <input type="radio" name="buyagain" id="buyagain3" value="3"><label for="buyagain3">&#9733;</label>
        <input type="radio" name="buyagain" id="buyagain2" value="2"><label for="buyagain2">&#9733;</label>
        <input type="radio" name="buyagain" id="buyagain1" value="1"><label for="buyagain1">&#9733;</label>
    </div>
    <button onclick="next('buyagain','comments')">Next</button>
</div>

<div class="section" id="comments">
    <h3>Comments (Optional)</h3>
    <textarea id="comments" placeholder="Write something..."></textarea>
    <button onclick="submitRatings()">Submit</button>
</div>

<script>
function next(current, nextId) {
    document.getElementById(current).classList.remove('active');
    document.getElementById(nextId).classList.add('active');
}

function submitRatings() {
    const categories = ["taste","packaging","service","buyagain"];
    let data = {};
    let allRated = true;

    categories.forEach(cat=>{
        const checked = document.querySelector(`input[name="${cat}"]:checked`);
        if(checked) data[cat]=checked.value;
        else allRated=false;
    });

    data.comments = document.getElementById("comments").value;

    if(!allRated){ alert("Please rate all 4 categories!"); return; }

    let existing = JSON.parse(localStorage.getItem("ratings")) || [];
    existing.push(data);
    localStorage.setItem("ratings", JSON.stringify(existing));

    // Clear selections
    categories.forEach(cat=>{
        const checked = document.querySelector(`input[name="${cat}"]:checked`);
        if(checked) checked.checked=false;
    });
    document.getElementById("comments").value = "";
}
</script>

</body>
</html>
